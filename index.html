<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malick Gueye — Photography</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

header {
    text-align: center;
    padding: 40px 20px;
    background: #000;
}

h1 {
    margin: 0;
    font-size: 2.5em;
    letter-spacing: 2px;
}

p.subtitle {
    color: #aaa;
    margin-top: 10px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 10px;
    padding: 10px;
}

.gallery img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

footer {
    text-align: center;
    padding: 30px;
    color: #888;
}
</style>
</head>

<body>

<header>
<h1>Malick Gueye</h1>
<p class="subtitle">Urban • Travel • Nature Photography</p>
</header>

<section class="gallery">

<img src="https://picsum.photos/800/600?random=1">
<img src="https://picsum.photos/800/600?random=2">
<img src="https://picsum.photos/800/600?random=3">
<img src="https://picsum.photos/800/600?random=4">
<img src="https://picsum.photos/800/600?random=5">
<img src="https://picsum.photos/800/600?random=6">

</section>

<footer>
<p>© 2026 Malick Gueye — All Rights Reserved</p>
</footer>

</body>
</html>
