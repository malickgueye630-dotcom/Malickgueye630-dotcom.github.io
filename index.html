<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malick Gueye — Photography</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

header {
    text-align: center;
    padding: 40px 20px;
    background: #000;
}

h1 {
    margin: 0;
    font-size: 2.5em;
    letter-spacing: 2px;
}

p.subtitle {
    color: #aaa;
    margin-top: 10px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 10px;
    padding: 10px;
}

.gallery img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

footer {
    text-align: center;
    padding: 30px;
    color: #888;


.gallery img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

footer {
  text-align: center;
  padding: 30px;
  color: #888;
}
/* ✅ Watermark automatique */
.photo{
  position: relative;
  overflow: hidden;
  border-radius: 10px;
}

.photo::after{
  content: "Malick Gueye ©";
  position: absolute;
  left: 10px;
  bottom: 10px;
  font-size: 14px;
  letter-spacing: 1px;
  opacity: 0.55;
  padding: 6px 10px;
  border-radius: 8px;
  background: rgba(0,0,0,0.35);
  color: #fff;
  pointer-events: none; /* IMPORTANT */
}

/* watermark “diagonal” léger (option pro) */
.photo::before{
  content: "Malick Gueye ©";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%) rotate(-25deg);
  font-size: 32px;
  opacity: 0.12;
  color: #fff;
  white-space: nowrap;
  pointer-events: none;
}
/* 🔒 Protection images (iPad / iPhone / Safari) */
.gallery img{
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  pointer-events: auto;
  touch-action: manipulation;

  -webkit-user-drag: none;
  user-drag: none;


}
 /* ✅ Visionneuse plein écran */
.viewer{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 18px;
}

.viewer img{
  max-width: 96vw;
  max-height: 90vh;
  border-radius: 12px;
  user-select: none;
  -webkit-user-drag: none;
}

.viewer-close{
  position: fixed;
  top: 18px;
  right: 20px;
  font-size: 42px;
  color: #fff;
  cursor: pointer;
  opacity: 0.8;
}
.topnav{
  position: sticky;
  top: 0;
  z-index: 9998;
  display: flex;
  gap: 18px;
  padding: 14px 18px;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
}
.topnav a{
  color: #fff;
  text-decoration: none;
  font-weight: 600;
  letter-spacing: .5px;
  opacity: .85;
}
.topnav a:hover{ opacity: 1; }

.intro, .about{
  padding: 22px 18px;
  max-width: 980px;
  margin: 0 auto;
}
.intro h2, .about h2{
  margin: 0 0 8px 0;
  letter-spacing: 1px;
}
.intro p, .about p{
  margin: 0;
  color: #bbb;
}
</style>
</head>

<body>
<nav class="topnav">
  <a href="#work">Work</a>
  <a href="#about">About</a>
  <a href="contact.html">Contact</a>
</nav>
<header>
<h1>Malick Gueye</h1>
<p class="subtitle">Urban • Travel • Nature Photography</p>
</header>
<section class="intro" id="work">
  <h2>Selected Work</h2>
  <p>Editorial • Documentary • Travel • Nature</p>
</section>
<div class="gallery">
  <div class="photo"><img src="IMG_0890.jpeg" alt="Photo 1"></div>
  <div class="photo"><img src="IMG_0892.jpeg" alt="Photo 2"></div>
  <div class="photo"><img src="IMG_0893.jpeg" alt="Photo 3"></div>
</div>
<section class="about" id="about">
  <h2>About</h2>
  <p>Photographer available for editorial assignments, brand storytelling and press coverage.</p>
</section>

</div>
<!-- ✅ Visionneuse plein écran -->
<div id="viewer" class="viewer">
  <span id="viewerClose" class="viewer-close">×</span>
  <img id="viewerImg" src="" alt="Photo en plein écran">
</div>

<footer>
<p>© 2026 Malick Gueye — All Rights Reserved</p>
</footer>
<script>
  // Désactive clic droit
  document.addEventListener('contextmenu', (e) => e.preventDefault());

  // Désactive le drag & drop des images
  document.addEventListener('dragstart', (e) => {
    if (e.target && e.target.tagName === 'IMG') e.preventDefault();
  });

  // Bloque quelques raccourcis classiques (pas infaillible)
  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (
      (e.ctrlKey && (key === 's' || key === 'u' || key === 'p')) || // save / view source / print
      (e.ctrlKey && e.shiftKey && (key === 'i' || key === 'j' || key === 'c')) // devtools
    ) {
      e.preventDefault();
    }
  });
</script>
<script>
/* 🔒 Protection iPad / iPhone — empêche enregistrer & glisser */


// ✅ Visionneuse plein écran
const viewer = document.getElementById('viewer');
const viewerImg = document.getElementById('viewerImg');
const viewerClose = document.getElementById('viewerClose');
// bloque drag + menu sur l'image en plein écran
viewerImg.setAttribute('draggable', 'false');
viewerImg.addEventListener('dragstart', (e) => e.preventDefault());

document.querySelectorAll('.gallery img').forEach(img => {
  img.addEventListener('click', () => {
    viewerImg.src = img.getAttribute('src');
    viewer.style.display = 'flex';
  });
});

viewerClose.addEventListener('click', () => {
  viewer.style.display = 'none';
  viewerImg.src = '';
});

viewer.addEventListener('click', (e) => {
  if (e.target === viewer) {
    viewer.style.display = 'none';
    viewerImg.src = '';
  }
});

// petit + : bloque clic droit aussi dans la visionneuse
viewer.addEventListener('contextmenu', (e) => e.preventDefault());
</script>
</body>
</html>
