<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malick Gueye — Photography</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

header {
    text-align: center;
    padding: 40px 20px;
    background: #000;
}

h1 {
    margin: 0;
    font-size: 2.5em;
    letter-spacing: 2px;
}

p.subtitle {
    color: #aaa;
    margin-top: 10px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 10px;
    padding: 10px;
}

.gallery img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

footer {
    text-align: center;
    padding: 30px;
    color: #888;


.gallery img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

footer {
  text-align: center;
  padding: 30px;
  color: #888;
}

/* 🔒 Protection images (iPad / iPhone / Safari) */
.gallery img{
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;

  -webkit-user-drag: none;
  user-drag: none;

  pointer-events: auto; /* IMPORTANT */
}
 
</style>
</head>

<body>

<header>
<h1>Malick Gueye</h1>
<p class="subtitle">Urban • Travel • Nature Photography</p>
</header>

<div class="gallery">

  <img src="IMG_0890.jpeg">
  <img src="IMG_0892.jpeg">
  <img src="IMG_0893.jpeg">


</div>

<footer>
<p>© 2026 Malick Gueye — All Rights Reserved</p>
</footer>
<script>
  // Désactive clic droit
  document.addEventListener('contextmenu', (e) => e.preventDefault());

  // Désactive le drag & drop des images
  document.addEventListener('dragstart', (e) => {
    if (e.target && e.target.tagName === 'IMG') e.preventDefault();
  });

  // Bloque quelques raccourcis classiques (pas infaillible)
  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (
      (e.ctrlKey && (key === 's' || key === 'u' || key === 'p')) || // save / view source / print
      (e.ctrlKey && e.shiftKey && (key === 'i' || key === 'j' || key === 'c')) // devtools
    ) {
      e.preventDefault();
    }
  });
</script>
<script>
/* 🔒 Protection iPad / iPhone — empêche enregistrer & glisser */

document.querySelectorAll('.gallery img').forEach(img => {

  // Empêche appui long (menu Enregistrer)
  img.addEventListener('touchstart', e => e.preventDefault());

  // Empêche sélection
  img.addEventListener('selectstart', e => e.preventDefault());

  // Empêche drag
  img.addEventListener('dragstart', e => e.preventDefault());

});
</script>
</body>
</html>
